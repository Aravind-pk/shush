version: v2
plugins:
  # Generates Go structs from protobuf messages
  - remote: buf.build/protocolbuffers/go
    out: backend/gen
    opt:
      - paths=source_relative

  # Generates ConnectRPC server handlers + clients in Go.
  # One handler serves gRPC, gRPC-Web, and HTTP/JSON — no separate gateway.
  - remote: buf.build/connectrpc/go
    out: backend/gen
    opt:
      - paths=source_relative

  # Generates OpenAPI v2 spec from the google.api.http annotations
  # (still useful: it documents the HTTP/JSON surface Connect exposes)
  - remote: buf.build/grpc-ecosystem/openapiv2
    out: docs
